<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 E-Reader Neon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1e1e22;display:flex;justify-content:center;align-items:center;
    min-height:100vh;font-family:system-ui,sans-serif;flex-direction:column;gap:10px;
  }
  .controls{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    background:#2a2a2e;padding:10px 16px;border-radius:10px;
  }
  .controls label{color:#aaa;font-size:11px;display:flex;align-items:center;gap:4px;}
  .controls select,.controls button{
    background:#444;color:#eee;border:1px solid #555;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;
  }
  .controls button{background:#505055;}
  .controls button:hover{background:#606068;}
  .btn-row{display:flex;gap:16px;align-items:center;padding:4px 0;}
  .btn{
    width:44px;height:44px;border-radius:50%;border:none;background:#505055;
    color:#ddd;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .06s;box-shadow:0 3px 0 #333;user-select:none;-webkit-tap-highlight-color:transparent;font-weight:700;
  }
  .btn:active,.btn.pressed{transform:translateY(3px);box-shadow:0 1px 0 #333;}
  .btn:hover{background:#5a5a60;}
  .btn-label{font-size:9px;color:#777;text-align:center;}
  .btn-group{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .panel-info{color:#666;font-size:10px;font-family:monospace;}
  #canvas-wrap{border-radius:3px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<div id="canvas-wrap"><canvas id="display" width="480" height="800"></canvas></div>

<div class="controls">
  <label>Bits:
    <select id="bitDepth">
      <option value="1">1-bit</option>
      <option value="2" selected>2-bit</option>
      <option value="4">4-bit</option>
    </select>
  </label>
  <label>Ghost:
    <select id="ghostLevel">
      <option value="0">0%</option>
      <option value="5">5%</option>
      <option value="10">10%</option>
      <option value="15" selected>15%</option>
    </select>
  </label>
  <label>Gênero:
    <select id="genreFilter"><option value="">Todos</option></select>
  </label>
  <button id="btnRefresh">⟳</button>
  <span class="panel-info" id="infoPanel">480×800</span>
</div>

<div class="btn-row">
  <div class="btn-group"><button class="btn" id="btnUp">▲</button><span class="btn-label">Anterior</span></div>
  <div class="btn-group"><button class="btn" id="btnDown">▼</button><span class="btn-label">Próximo</span></div>
  <div class="btn-group"><button class="btn" id="btnSel">●</button><span class="btn-label">Sel</span></div>
</div>

<script>
// ───────────────────────────────────────────────────────────────
const W = 480, H = 800;
const canvas = document.getElementById('display');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const pixelBuffer = new Uint8Array(W * H);
const ghostBuffer = new Uint8Array(W * H);
const displayBuffer = new Uint8Array(W * H);

let refreshing = false;
const bitDepthEl = document.getElementById('bitDepth');
const ghostLevelEl = document.getElementById('ghostLevel');
const genreFilterEl = document.getElementById('genreFilter');
const infoPanel = document.getElementById('infoPanel');

function getBitDepth() { return parseInt(bitDepthEl.value); }
function getGhostFactor() { return parseInt(ghostLevelEl.value) / 100; }

function fillBuf(buf, v) { buf.fill(v); }
function copyBuf(s, d) { d.set(s); }

function floydSteinberg(src, dst, w, h, levels) {
  const err = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) err[i] = src[i];
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const o = err[i], n = Math.round(o / 255 * (levels - 1)) * (255 / (levels - 1));
      const q = o - n;
      dst[i] = Math.max(0, Math.min(255, Math.round(n)));
      if (x + 1 < w) err[i + 1] += q * 7 / 16;
      if (y + 1 < h) {
        if (x > 0) err[i + w - 1] += q * 3 / 16;
        err[i + w] += q * 5 / 16;
        if (x + 1 < w) err[i + w + 1] += q * 1 / 16;
      }
    }
}

function thresholdDither(src, dst, w, h, levels) {
  const s = 255 / (levels - 1);
  for (let i = 0; i < w * h; i++) dst[i] = Math.round(src[i] / s) * s;
}

function applyDither(src, dst, w, h, bd) {
  const l = 1 << bd;
  bd <= 2 ? floydSteinberg(src, dst, w, h, l) : thresholdDither(src, dst, w, h, l);
}

function applyGhost(t, g, f) {
  if (f <= 0) return;
  for (let i = 0; i < W * H; i++) t[i] = Math.round(t[i] * (1 - f) + g[i] * f);
}

function doGlobalRefresh(cb) {
  if (refreshing) { cb(); return; }
  refreshing = true;
  fillBuf(pixelBuffer, 0);
  renderDisplayBuffer(); drawToScreen();
  setTimeout(() => {
    fillBuf(pixelBuffer, 255);
    renderDisplayBuffer(); drawToScreen();
    setTimeout(() => { refreshing = false; cb(); }, 80);
  }, 80);
}

function renderDisplayBuffer() {
  const t = new Uint8Array(W * H);
  t.set(pixelBuffer);
  applyGhost(t, ghostBuffer, getGhostFactor());
  applyDither(t, displayBuffer, W, H, getBitDepth());
  copyBuf(pixelBuffer, ghostBuffer);
}

function drawToScreen() {
  const id = ctx.createImageData(W, H);
  for (let i = 0; i < W * H; i++) {
    const v = displayBuffer[i], j = i * 4;
    id.data[j] = v; id.data[j + 1] = v; id.data[j + 2] = v; id.data[j + 3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

function updateInfo(m) { infoPanel.textContent = `480×800 · ${getBitDepth()}-bit · ${m}`; }

function drawRect(buf, x, y, w, h, g) {
  for (let py = y; py < Math.min(y + h, H); py++)
    for (let px = x; px < Math.min(x + w, W); px++)
      buf[py * W + px] = g;
}

function drawText(buf, x, y, text, size, color, font) {
  const s = 3; // supersample
  const tc = document.createElement('canvas');
  tc.width = W * s; tc.height = H * s;
  const tctx = tc.getContext('2d');
  tctx.fillStyle = '#f5f0e8';
  tctx.fillRect(0, 0, tc.width, tc.height);
  tctx.fillStyle = `rgb(${color},${color},${color})`;
  tctx.font = `${size * s}px ${font || 'Georgia'}`;
  tctx.textBaseline = 'top';
  const lines = text.split('\n');
  lines.forEach((line, i) => { tctx.fillText(line, x * s, (y + i * size * 1.3) * s); });
  const id = tctx.getImageData(0, 0, W * s, H * s);
  for (let py = 0; py < H; py++)
    for (let px = 0; px < W; px++) {
      const si = (py * s * W * s + px * s) * 4;
      const g = Math.round(id.data[si] * 0.299 + id.data[si + 1] * 0.587 + id.data[si + 2] * 0.114);
      const di = py * W + px;
      buf[di] = Math.min(buf[di], g);
    }
}

// ─── COVERS ────────────────────────────────────────────────
function genCover(buf, idx) {
  const cw = 80, ch = 130;
  const pb = new Uint8Array(cw * ch);
  pb.fill(220);

  const p = [
    (b) => { for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) b[y * cw + x] = Math.floor(y / 8) % 2 ? 40 : 180; },
    (b) => { const cx = 40, cy = 65; for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) { const d = Math.hypot(x - cx, y - cy); b[y * cw + x] = d < 30 ? 30 : d < 50 ? 160 : 200; }},
    (b) => { for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) b[y * cw + x] = (x % 14 < 2 || y % 14 < 2) ? 60 : 190; },
    (b) => { for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) b[y * cw + x] = Math.round(180 - (x + y * 0.7) * 0.6); },
    (b) => { for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) b[y * cw + x] = ((x + y * 0.7) % 12 < 3) ? 50 : 185; },
  ];
  (p[idx % p.length] || p[0])(pb);

  // Border
  for (let y = 0; y < ch; y++) for (let x = 0; x < cw; x++) { if (x < 1 || x >= cw - 1 || y < 1 || y >= ch - 1) pb[y * cw + x] = 0; }

  return pb;
}

function drawCover(buf, pb, dx, dy) {
  const cw = 80, ch = 130;
  for (let y = 0; y < ch && dy + y < H; y++)
    for (let x = 0; x < cw && dx + x < W; x++)
      buf[(dy + y) * W + (dx + x)] = pb[y * cw + x];
}

// ─── BOOKS ──────────────────────────────────────────────────
const LIVROS = [
  { t: 'Dom Quixote', a: 'Cervantes', g: 'Romance', p: 42 },
  { t: 'Memórias Póstumas', a: 'Machado de Assis', g: 'Romance', p: 38 },
  { t: '1984', a: 'George Orwell', g: 'Ficção', p: 45 },
  { t: 'O Pequeno Príncipe', a: 'Saint-Exupéry', g: 'Infantil', p: 28 },
  { t: 'Neuromancer', a: 'W. Gibson', g: 'Ficção Científica', p: 36 },
  { t: 'A Metamorfose', a: 'Franz Kafka', g: 'Romance', p: 32 },
  { t: 'Sherlock Holmes', a: 'A. C. Doyle', g: 'Mistério', p: 40 },
];
let livroAtual = 0;
const generos = [...new Set(LIVROS.map(l => l.g))];
generos.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; genreFilterEl.appendChild(o); });

const TEXTOS = [
  `No lugar da Mancha, de cujo nome não quero lembrar-me, vivia não há muito tempo um fidalgo dos de lança em cabide, adarga antiga, rocim magro e cão de caça. Uma sopa mais de vaca que de carneiro, picadinho quase todas as noites, duelos e quebrantos aos sábados, lentilhas às sextas, e algum pombinho extra aos domingos, consumiam três quartas partes da sua fazenda.`,
  `O resto dela concluíam saio de veludo, calças de veludo da mesma cor, com seus pés de chumbo — que não eram de chumbo, mas de qualquer outro metal — e borzeguins do mesmo. A idade do nosso fidalgo beirava os cinquenta anos. Era de compleição robusta, seco de carnes, enxuto de rosto, grande madrugador e amigo da caça.`,
  `Quiseram alguns que o apelido fosse Quijada ou Quesada, que nisto há alguma diferença entre os autores que deste caso escrevem; ainda que por conjeturas verossímeis se deixa entender que se chamava Quijana. Mas isso importa pouco para a nossa história: basta que na narração dela não se saia um ponto da verdade.`,
  `É, pois, de saber que este sobredito fidalgo, nos intervalos de ócio — que eram os maiores do ano —, se dava a ler livros de cavalarias, com tamanha afeição e gosto, que esqueceu quase de todo o exercício da caça e até a administração de sua fazenda.`,
  `Assim, com estes pensamentos e discursos, veio a perder o pobre fidalgo o juízo, desvelando-se por entender aquelas razões e dar-lhes sentido, que não lho tirara nem lho poderia tirar o próprio Aristóteles, se ressuscitara só para isso.`,
];
const TOTAL_PAG = 24;
let paginaAtual = 1;

const S = { MENU: 0, LENDO: 1, CONFIG: 2, DORMINDO: 3 };
let estado = S.MENU;

const CKEYS = ['margem','espacamento','tempo_tela','fonte','leds'];
const CLABEL = ['Margem (px)','Espaçamento','Tempo (min)','Fonte','LEDs (%)'];
const CMIN = [0,0,1,0,0], CMAX = [50,20,30,24,100];
let cfg = { margem:10, espacamento:4, tempo_tela:5, fonte:22, leds:50 };
let cfgItem = 0, editMode = false;

const IDLE_MS = 30000;
let lastAct = Date.now(), sleepTimer = null;
function atvTimer() {
  lastAct = Date.now(); clearTimeout(sleepTimer);
  sleepTimer = setTimeout(() => { if (estado !== S.DORMINDO) { estado = S.DORMINDO; renderRefresh(); } }, IDLE_MS);
}

function renderRefresh(cb) { doGlobalRefresh(() => { renderFrame(); if (cb) cb(); }); }

function renderFrame() {
  fillBuf(pixelBuffer, 238);
  if (estado === S.MENU) renderMenu();
  else if (estado === S.LENDO) renderLendo();
  else if (estado === S.CONFIG) renderConfig();
  else renderDormindo();
  renderDisplayBuffer(); drawToScreen();
  updateInfo(estado === S.MENU ? 'Menu' : estado === S.LENDO ? `Pág ${paginaAtual}` : estado === S.CONFIG ? 'Config' : '💤');
}

function getFiltered() {
  const g = genreFilterEl.value;
  return g ? LIVROS.filter(l => l.g === g) : LIVROS;
}

function renderMenu() {
  const books = getFiltered();
  if (books.length === 0) { drawText(pixelBuffer, 120, 350, 'Nenhum livro', 16, 120); return; }
  let ai = books.indexOf(LIVROS[livroAtual]);
  if (ai < 0) { livroAtual = LIVROS.indexOf(books[0]); ai = 0; }

  drawRect(pixelBuffer, 0, 0, W, 32, 200);
  drawText(pixelBuffer, 12, 6, '📖 BIBLIOTECA', 13, 40, 'system-ui');
  drawText(pixelBuffer, W - 60, 8, `${books.length}`, 10, 100, 'system-ui');

  let y = 44;
  // Pre-generate covers
  const coverCache = LIVROS.map((_, i) => genCover(null, i));

  books.forEach((livro, i) => {
    const ia = i === ai;
    const bg = ia ? 205 : 228;
    if (y + 140 > H) return;

    // Cover
    const cpb = genCover(null, LIVROS.indexOf(livro));
    drawCover(pixelBuffer, cpb, 12, y + 4);

    // Info
    const tx = 100;
    drawText(pixelBuffer, tx, y + 4, ia ? `▶ ${livro.t}` : `  ${livro.t}`, 12, ia ? 20 : 60);
    drawText(pixelBuffer, tx, y + 24, livro.a, 9, 110, 'system-ui');
    drawText(pixelBuffer, tx, y + 40, livro.g, 8, 140, 'system-ui');

    // Selection indicator
    if (ia) {
      drawRect(pixelBuffer, 10, y + 2, 84, 132, 0);
    }

    // Separator
    drawRect(pixelBuffer, 100, y + 134, W - 110, 1, 210);

    y += 144;
  });

  drawText(pixelBuffer, 10, H - 20, '▲/▼ ● abrir  ●(1s) Config', 9, 140, 'system-ui');
}

function renderLendo() {
  const livro = LIVROS[livroAtual];

  drawRect(pixelBuffer, 0, 0, W, 32, 200);
  drawText(pixelBuffer, 10, 6, `📄 ${livro.t.substring(0, 24)}`, 11, 40, 'system-ui');
  drawText(pixelBuffer, W - 60, 7, `${paginaAtual}/${TOTAL_PAG}`, 10, 100, 'system-ui');

  const mg = cfg.margem + 10;
  const lh = cfg.espacamento + 18;
  const fs = cfg.fonte <= 14 ? 12 : cfg.fonte <= 18 ? 14 : cfg.fonte <= 22 ? 15 : 16;

  const ti = (paginaAtual - 1) % TEXTOS.length;
  const t1 = TEXTOS[ti];
  const t2 = `Continuou o nosso fidalgo nas suas leituras, passando as noites a ler do sol posto ao amanhecer. E assim, do pouco dormir e do muito ler, se lhe secou o cérebro, de maneira que veio a perder o juízo.`;

  drawText(pixelBuffer, mg, 44, t1, fs, 30);
  drawText(pixelBuffer, mg, 44 + lh * 9, t2, fs, 30);

  drawText(pixelBuffer, 10, H - 20, '▲/▼ página  ● menu  ●(1s) Config', 9, 140, 'system-ui');
}

function renderConfig() {
  drawRect(pixelBuffer, 0, 0, W, 32, 200);
  drawText(pixelBuffer, 10, 6, editMode ? '✏️ EDITANDO' : '⚙️ CONFIG', 12, 40, 'system-ui');

  let y = 48;
  CKEYS.forEach((k, i) => {
    const ia = i === cfgItem, ie = editMode && ia;
    drawRect(pixelBuffer, 14, y, W - 28, 32, ie ? 170 : ia ? 195 : 225);

    let v = cfg[k];
    if (k === 'leds') v = v + '%';
    else if (k === 'fonte') v = ({14:'P',18:'M',22:'G',24:'X'})[v] || v;

    const p = ie ? '✏️ ' : ia ? '▶ ' : '  ';
    drawText(pixelBuffer, 24, y + 6, `${p}${CLABEL[i]}`, 10, ia ? 10 : 80, 'system-ui');
    drawText(pixelBuffer, W - 50, y + 6, String(v), 10, ie ? 0 : 100, 'system-ui');

    y += 38;
  });

  drawText(pixelBuffer, 10, H - 20, editMode ? '▲/▼ ajustar  ● confirmar  ●(1s) sair' : '▲/▼ navegar  ● editar  ●(1s) voltar', 9, 140, 'system-ui');
}

function renderDormindo() {
  fillBuf(pixelBuffer, 230);
  drawText(pixelBuffer, 160, 300, '💤', 48, 120, 'system-ui');
  drawText(pixelBuffer, 140, 360, 'Deep Sleep', 18, 80, 'system-ui');
  drawText(pixelBuffer, 120, 390, 'Pressione ● para acordar', 11, 130, 'system-ui');
}

// ─── HANDLERS ──────────────────────────────────────────────
function handle(d) {
  if (estado === S.DORMINDO) { estado = S.MENU; atvTimer(); renderRefresh(); return; }
  let m = false;
  const books = getFiltered();
  if (estado === S.MENU) {
    const ai = books.indexOf(LIVROS[livroAtual]); let idx = ai >= 0 ? ai : 0;
    if (d.c && books.length) { idx = (idx - 1 + books.length) % books.length; livroAtual = LIVROS.indexOf(books[idx]); m = true; }
    if (d.v && books.length) { idx = (idx + 1) % books.length; livroAtual = LIVROS.indexOf(books[idx]); m = true; }
    if (d.s) { if (books.length) { paginaAtual = 1; estado = S.LENDO; } m = true; }
    if (d.l) { cfgItem = 0; editMode = false; estado = S.CONFIG; m = true; }
  } else if (estado === S.LENDO) {
    if (d.c && paginaAtual > 1) { paginaAtual--; m = true; }
    if (d.v && paginaAtual < TOTAL_PAG) { paginaAtual++; m = true; }
    if (d.s) { estado = S.MENU; m = true; }
    if (d.l) { cfgItem = 0; editMode = false; estado = S.CONFIG; m = true; }
  } else if (estado === S.CONFIG) {
    if (editMode) {
      if (d.c) {
        if (CKEYS[cfgItem] === 'fonte') { const f = [14,18,22,24]; const fi = f.indexOf(cfg.fonte); cfg.fonte = f[(fi + 1) % f.length]; }
        else cfg[CKEYS[cfgItem]] = Math.min(cfg[CKEYS[cfgItem]] + 1, CMAX[cfgItem]);
        m = true;
      }
      if (d.v) {
        if (CKEYS[cfgItem] === 'fonte') { const f = [14,18,22,24]; const fi = f.indexOf(cfg.fonte); cfg.fonte = f[(fi - 1 + f.length) % f.length]; }
        else cfg[CKEYS[cfgItem]] = Math.max(cfg[CKEYS[cfgItem]] - 1, CMIN[cfgItem]);
        m = true;
      }
      if (d.s) { editMode = false; m = true; }
      if (d.l) { editMode = false; estado = S.MENU; m = true; }
    } else {
      if (d.c) { cfgItem = (cfgItem - 1 + CKEYS.length) % CKEYS.length; m = true; }
      if (d.v) { cfgItem = (cfgItem + 1) % CKEYS.length; m = true; }
      if (d.s) { editMode = true; m = true; }
      if (d.l) { editMode = false; estado = S.MENU; m = true; }
    }
  }
  if (m) { atvTimer(); renderRefresh(); }
}

// ─── BOTÕES ────────────────────────────────────────────────
function setup() {
  ['btnUp','btnDown','btnSel'].forEach((id, bi) => {
    const el = document.getElementById(id);
    let pt, il = false;
    const dn = (e) => { e.preventDefault(); el.classList.add('pressed'); il = false; pt = setTimeout(() => { il = true; }, 1000); };
    const up = () => { el.classList.remove('pressed'); clearTimeout(pt);
      handle({c: bi===0&&!il, v: bi===1&&!il, s: bi===2&&!il, l: bi===2&&il}); };
    el.addEventListener('mousedown', dn); el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', () => { el.classList.remove('pressed'); clearTimeout(pt); });
    el.addEventListener('touchstart', dn, {passive:false}); el.addEventListener('touchend', up);
  });

  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp': case 'w': handle({c:1,v:0,s:0,l:0}); e.preventDefault(); break;
      case 'ArrowDown': case 's': handle({c:0,v:1,s:0,l:0}); e.preventDefault(); break;
      case 'Enter': case ' ': handle({c:0,v:0,s:1,l:0}); e.preventDefault(); break;
      case 'c': case 'C': handle({c:0,v:0,s:0,l:1}); break;
    }
  });

  document.getElementById('btnRefresh').onclick = () => { if (!refreshing) renderRefresh(); };
  genreFilterEl.onchange = () => { const b = getFiltered(); if (b.length) livroAtual = LIVROS.indexOf(b[0]); renderRefresh(); };
  bitDepthEl.onchange = () => renderFrame();
  ghostLevelEl.onchange = () => renderFrame();
}

fillBuf(pixelBuffer, 238);
setup();
atvTimer();
renderRefresh();
</script>
</body>
</html>
